---
loki:
  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    ingester:
      chunk_encoding: snappy
      # Flush WAL to object storage before shutdown so the next startup has nothing to replay.
      # Without this, dirty WAL on the PVC causes write pods to hang waiting for MinIO during ring formation.
      wal:
        flush_on_shutdown: true
      # Don't attempt to transfer in-memory chunks to peer ingesters on shutdown.
      # With 0 retries, the ingester flushes to object storage immediately instead of
      # waiting for peers that may already be down.
      max_transfer_retries: 0
    memberlist:
      # Explicitly target the chart-managed headless service for ring discovery.
      # Without this, pods rely on gossip broadcast which fails when all write replicas
      # restart simultaneously — each waits for others to join, causing a deadlock.
      join_members:
        - loki-memberlist
    tracing:
      enabled: true
    querier:
      # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
      max_concurrent: 4

    commonConfig:
      ring:
        kvstore:
          # Backend storage to use for the ring
          # CLI flag: -common.storage.ring.store
          store: memberlist

  deploymentMode: SimpleScalable

  backend:
    replicas: 3
    persistence:
      size: 10Gi
      storageClass: zfs-nvmeof
  read:
    replicas: 3
  write:
    replicas: 3
    persistence:
      size: 50Gi
      storageClass: zfs-nvmeof

  # Enable minio for storage
  minio:
    enabled: true
    persistence:
      size: 150Gi
      storageClass: zfs-nvmeof

  # Zero out replica counts of other deployment modes
  singleBinary:
    replicas: 0

  ingester:
    replicas: 0
  querier:
    replicas: 0
  queryFrontend:
    replicas: 0
  queryScheduler:
    replicas: 0
  distributor:
    replicas: 0
  compactor:
    replicas: 0
  indexGateway:
    replicas: 0
  bloomCompactor:
    replicas: 0
  bloomGateway:
    replicas: 0

  monitoring:
    dashboards:
      enabled: true

    serviceMonitor:
      enabled: true

    metricsInstance:
      enabled: false
