---
ingress-nginx:

  controller:
    kind: DaemonSet

    # Permit snippets
    allowSnippetAnnotations: true
    config:
      # Permit snippets
      # https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/configmap/#annotations-risk-level
      # https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/annotations-risk/
      annotations-risk-level: Critical
      custom-http-errors: "503,502,504,500"

    extraArgs:
      default-backend-service: error-pages/error-pages

    admissionWebhooks:
      enabled: false

    ingressClassResource:
      name: nginx-external
      controllerValue: k8s.io/ingress-nginx-external
    ingressClass: nginx-external

    resources:
      requests:
        cpu: 100m
        memory: 90Mi

    service:
      annotations:
        metallb.universe.tf/loadBalancerIPs: '192.168.4.62'

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  defaultBackend:
    enabled: false

  tcp: {}
  udp: {}
