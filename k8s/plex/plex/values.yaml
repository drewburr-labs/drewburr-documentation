# Default values for example.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/drewburr-labs/plex
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  # cri-containerd's default AppArmor profile denies DRM ioctls on the
  # Arc B570 (xe driver), so DRM_IOCTL_VERSION fails with ECANCELED and
  # libva can't init. Unconfined only on the plex container; the mkdir
  # init still runs under the default profile.
  # NOTE: an identical DRM_IOCTL_VERSION/ECANCELED symptom also appears when
  # the Battlemage GT is hard-hung (GuC queue timeout). This Unconfined fix
  # does NOT address that — if the error persists with this set, the GPU is
  # wedged, not blocked by AppArmor. See
  # incidents/kube05-xe-gt1-hang-maul-transcode.md.
  appArmorProfile:
    type: Unconfined
  # capabilities:
  #   drop:
  #   - ALL
  # runAsNonRoot: true
  # runAsUser: 1001
  # runAsGroup: 1001

# Ports to be exposed, grouped by services
# https://support.plex.tv/articles/201543147-what-network-ports-do-i-need-to-allow-through-my-firewall/
services:
  - name: https
    type: ClusterIP
    port: 32400
    protocol: TCP
    ingress:
      className: nginx-external
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        nginx.ingress.kubernetes.io/backend-protocol: 'HTTPS'
        external-dns.alpha.kubernetes.io/target: ip.drewburr.com
      hosts:
        - host: plex.drewburr.com
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: plex-ingress
          hosts:
            - plex.drewburr.com

  # # The following additional ports are also used within the local network for different services
  # local:
  #   type: ClusterIP
  #   ports:
  #     - name: dlnaUdp
  #       port: 1900
  #       protocol: UDP
  #     - name: bonjour
  #       port: 5353
  #       protocol: UDP
  #     - name: companion
  #       port: 8324
  #       protocol: TCP
  #     - name: gdm
  #       port: 32410
  #       protocol: UDP
  #     - port: 32412
  #       protocol: UDP
  #     - port: 32413
  #       protocol: UDP
  #     - port: 32414
  #       protocol: UDP
  #     - name: dlnaTcp
  #       port: 32469
  #       protocol: TCP

resources:
  limits:
    gpu.intel.com/xe: 1
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Appended to env. Supports envFrom
env: []

# Key: value environment variables to be appended to env
envVars:
  PLEX_UID: 1001
  PLEX_GID: 1001
  TZ: America/New_York
  HOSTNAME: plex.drewburr.com
  ADVERTISE_IP: https://plex.drewburr.com
  CHANGE_CONFIG_DIR_OWNERSHIP: 'false'

# dnsPolicy: None
# dnsConfig:
#   nameservers:
#     - 192.168.4.1
#     - 1.1.1.1

# All are mounted under fsroot `/`. Supports additions
persistence:
  - name: plex-config
    mountPath: config
    accessModes:
      - ReadWriteOnce
    requests: 150Gi
    storageClassName: zfs-nvmeof
  - name: plex-data
    mountPath: data
    accessModes:
      - ReadWriteMany
    requests: 40Ti
    storageClassName: nfs-lake
  - name: backups
    accessModes:
      - ReadWriteMany
    requests: 50Gi
    storageClassName: zfs-nfs
  - name: transcode-large
    accessModes:
      - ReadWriteOnce
    requests: 150Gi
    storageClassName: zfs-nvmeof

additionalVolumes: []

additionalVolumeMounts: []

nodeSelector: {}

tolerations:
  - key: compute
    operator: Exists
    effect: PreferNoSchedule

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: compute
              operator: In
              values:
                - 'true'

initContainers:
  - name: mkdir
    image:
      repository: ghcr.io/drewburr-labs/plex
      pullPolicy: Always
      # Overrides the image tag whose default is the chart appVersion.
      tag: latest
    command:
      - /bin/bash
      - -c
      - >-
        mkdir -p /data/downloads/torrents/{movies,tv,anime} &&
        mkdir -p /data/downloads/usenet/incomplete &&
        mkdir -p /data/downloads/usenet/complete/{movies,tv,anime} &&
        mkdir -p /data/media/{movies,tv,anime} &&
        mkdir -p /backups/{overseerr,plex,radarr,sabnzbd,sonarr,sonarr-anime}
    securityContext:
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001

# /identity is unauthenticated and only returns 200 once PMS has actually
# opened its databases and is serving — a bare tcpSocket check passes while
# PMS is crash-looping on a corrupt DB (which is how a dead PMS reported
# Running and 502'd plex.drewburr.com).
startupProbe:
  httpGet:
    path: /identity
    port: 32400
  # Allow up to 5m for first start (large library / DB checkpoint on boot).
  failureThreshold: 30
  periodSeconds: 10
# /identity returns 200 even when PMS is fully deadlocked (it never touches
# the library DB), so an httpGet /identity liveness check cannot detect a
# connection-pool deadlock — PMS sat dead 12h+ until noticed, 3x in a week.
# This exec probe issues a real token-authed library-DB query; when the pool
# is exhausted the request hangs, the probe times out, and kubelet restarts
# PMS within ~1m. Uses bash /dev/tcp (no curl in image); fails closed.
livenessProbe:
  exec:
    command:
      - /bin/bash
      - -c
      - >-
        T=$(sed -n 's/.*PlexOnlineToken="\([^"]*\)".*/\1/p'
        "/config/Library/Application Support/Plex Media Server/Preferences.xml");
        exec 3<>/dev/tcp/127.0.0.1/32400 || exit 1;
        printf 'GET /library/sections?X-Plex-Token=%s HTTP/1.0\r\nHost: localhost\r\n\r\n' "$T" >&3;
        head -1 <&3 | grep -q ' 200 '
  periodSeconds: 20
  timeoutSeconds: 10
  # ~3 missed checks (~60-80s) before restart: tolerant of brief stalls
  # under heavy transcode, fast enough to end a deadlock automatically.
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /identity
    port: 32400
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# PMS must checkpoint its SQLite WAL on shutdown. With the default 30s grace
# period a busy server is SIGKILLed mid-write, leaving a huge inconsistent
# WAL that PMS then refuses to open (DB::Exception crash loop). Give it time
# to stop cleanly, and proactively signal + wait in a preStop hook.
terminationGracePeriodSeconds: 120
lifecycle:
  preStop:
    exec:
      command:
        - /bin/bash
        - -c
        - >-
          pkill -TERM -f 'Plex Media Server' || true;
          for i in $(seq 1 110); do
          pgrep -f 'Plex Media Server' >/dev/null 2>&1 || exit 0;
          sleep 1;
          done
