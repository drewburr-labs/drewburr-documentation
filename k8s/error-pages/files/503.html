<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>503 — Spud is napping</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #f0e6d3;
      padding: 2rem;
    }

    .card {
      background: #16213e;
      border: 2px solid #f4a826;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(244, 168, 38, 0.15);
    }

    .mascot-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    .mascot {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(244, 168, 38, 0.4));
    }

    .zzz {
      position: absolute;
      top: -8px;
      right: -16px;
      font-size: 1.8rem;
      animation: zzz 2s ease-in-out infinite;
      opacity: 0.9;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    @keyframes zzz {
      0%, 100% { transform: translateY(0) scale(1);   opacity: 0.9; }
      50%       { transform: translateY(-6px) scale(1.1); opacity: 0.5; }
    }

    .error-code {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #f4a826, #6bcf7f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f4a826;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1rem;
      color: #b8a99a;
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }

    .tip {
      display: inline-block;
      background: rgba(244, 168, 38, 0.1);
      border: 1px solid rgba(244, 168, 38, 0.3);
      border-radius: 12px;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      color: #f4a826;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #4a4060;
    }
  </style>
</head>
