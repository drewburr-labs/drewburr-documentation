---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-pages
  namespace: {{ .Release.Namespace }}
  labels:
    app: error-pages
spec:
  replicas: 1
  selector:
    matchLabels:
      app: error-pages
  template:
    metadata:
      labels:
        app: error-pages
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: pages
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: pages
          configMap:
            name: error-pages
            items:
              - key: 503.html
                path: 503.html
              - key: 404.html
                path: 404.html
        - name: nginx-conf
          configMap:
            name: error-pages
            items:
              - key: nginx.conf
                path: nginx.conf
