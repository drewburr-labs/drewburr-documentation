---
# Cluster-wide store that reads the manually-created secrets out of the
# shared-secrets namespace. Referenced by every ClusterExternalSecret below.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: shared-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Values.sourceNamespace }}
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: {{ .Values.sourceNamespace }}
          key: ca.crt
      auth:
        serviceAccount:
          name: {{ .Values.storeServiceAccount }}
          namespace: {{ .Values.sourceNamespace }}
