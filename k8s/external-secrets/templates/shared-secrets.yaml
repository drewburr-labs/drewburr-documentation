---
# The common namespace holding the manually-created source secrets.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.sourceNamespace }}
---
# Identity ESO authenticates as when reading secrets from sourceNamespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.storeServiceAccount }}
  namespace: {{ .Values.sourceNamespace }}
---
# Read access to the source secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.storeServiceAccount }}
  namespace: {{ .Values.sourceNamespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.storeServiceAccount }}
  namespace: {{ .Values.sourceNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.storeServiceAccount }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.storeServiceAccount }}
    namespace: {{ .Values.sourceNamespace }}
---
# Let the ESO controller mint short-lived tokens for the reader SA
# (the kubernetes provider uses TokenRequest to authenticate as it).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.storeServiceAccount }}-token
  namespace: {{ .Values.sourceNamespace }}
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: [{{ .Values.storeServiceAccount | quote }}]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.storeServiceAccount }}-token
  namespace: {{ .Values.sourceNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.storeServiceAccount }}-token
subjects:
  - kind: ServiceAccount
    name: {{ .Values.controllerServiceAccount }}
    namespace: {{ .Values.controllerNamespace }}
