{{- range .Values.pullSecrets }}
---
# Pushes ghcr-{{ .name }} (a kubernetes.io/dockerconfigjson pull secret) into
# every namespace labeled `{{ $.Values.labelPrefix }}/{{ .name }}: "true"`,
# sourced from the `ghcr-{{ .name }}` secret in shared-secrets. A namespace
# opts in by carrying that label (see managedNamespaceMetadata in an app's
# config.yaml); no central namespace list.
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: ghcr-{{ .name }}
spec:
  externalSecretName: ghcr-{{ .name }}
  namespaceSelectors:
    - matchLabels:
        {{ $.Values.labelPrefix }}/{{ .name }}: "true"
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: shared-secrets
      kind: ClusterSecretStore
    target:
      name: ghcr-{{ .name }}
      template:
        type: kubernetes.io/dockerconfigjson
        data:
          .dockerconfigjson: "{{ `{{ .dockerconfigjson }}` }}"
    data:
      - secretKey: dockerconfigjson
        remoteRef:
          key: ghcr-{{ .name }}
          property: dockerconfigjson
{{- end }}
