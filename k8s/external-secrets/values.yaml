---
# Namespace where the REAL secrets are created manually (kubectl create secret).
# The ClusterSecretStore reads from here; nothing in this repo templates the
# secret material itself — only the distribution rules.
sourceNamespace: shared-secrets

# ServiceAccount (in sourceNamespace) that ESO authenticates as when reading
# the shared secrets, plus the ESO controller identity allowed to mint its token.
storeServiceAccount: eso-store-reader
controllerServiceAccount: external-secrets
controllerNamespace: external-secrets

# ---------------------------------------------------------------------------
# GHCR pull-token distribution.
#
# For each entry:
#   1. Manually create the source secret ONCE in the shared-secrets namespace:
#        kubectl -n shared-secrets create secret generic ghcr-<name> \
#          --from-literal=dockerconfigjson='{"auths":{"ghcr.io":{"auth":"<base64 user:PAT>"}}}'
#   2. A namespace opts in by carrying the label `<labelPrefix>/<name>: "true"`.
#      For an Argo-managed app, set it in that app's config.yaml:
#        managedNamespaceMetadata:
#          labels:
#            ghcr.drewburr.com/<name>: "true"
#
# ESO then pushes a kubernetes.io/dockerconfigjson secret named `ghcr-<name>`
# into every labeled namespace and keeps it in sync.
# ---------------------------------------------------------------------------
labelPrefix: ghcr.drewburr.com

pullSecrets:
  - name: example-repo        # -> label ghcr.drewburr.com/example-repo, secret ghcr-example-repo

# --- External Secrets Operator subchart values ---
external-secrets:
  installCRDs: true
  crds:
    enabled: true
